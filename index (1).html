<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Намир Групп — Сургалтын систем</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #0078d4;
    --blue-dark: #005fa3;
    --blue-light: #e8f3fc;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f0f4f8;
    --card: #ffffff;
    --error-bg: #fff5f5;
    --error-border: #fecaca;
    --error-text: #dc2626;
    --success: #059669;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background geometric decoration */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(0,120,212,0.10) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(0,120,212,0.07) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 44px 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.05);
    position: relative;
    animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), #50b5ff);
    border-radius: 0 0 4px 4px;
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
    background: var(--blue-light);
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
  }
  .logo-icon svg {
    width: 26px; height: 26px;
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo p {
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 24px;
  }
  .divider span {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider p {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Microsoft SSO button */
  .ms-btn {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.18s ease;
    margin-bottom: 24px;
  }
  .ms-btn:hover {
    border-color: var(--blue);
    background: var(--blue-light);
    color: var(--blue);
  }
  .ms-btn:active { transform: scale(0.99); }

  /* MS Logo */
  .ms-logo {
    width: 18px; height: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    flex-shrink: 0;
  }
  .ms-logo span {
    display: block;
    border-radius: 1px;
  }
  .ms-logo span:nth-child(1) { background: #f25022; }
  .ms-logo span:nth-child(2) { background: #7fba00; }
  .ms-logo span:nth-child(3) { background: #00a4ef; }
  .ms-logo span:nth-child(4) { background: #ffb900; }

  /* Separator */
  .sep {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .sep span { flex: 1; height: 1px; background: var(--border); }
  .sep p { font-size: 12px; color: var(--muted); }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 7px;
    letter-spacing: 0.1px;
  }

  .input-wrap {
    position: relative;
  }
  .input-wrap svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    width: 16px; height: 16px;
    pointer-events: none;
  }
  input[type="email"] {
    width: 100%;
    padding: 12px 14px 12px 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: #fafafa;
  }
  input[type="email"]:focus {
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 3px rgba(0,120,212,0.10);
  }
  input[type="email"]::placeholder { color: #b0b7c3; }

  .submit-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    letter-spacing: 0.1px;
  }
  .submit-btn:hover { background: var(--blue-dark); }
  .submit-btn:active { transform: scale(0.99); }

  .error {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 8px;
    color: var(--error-text);
    font-size: 13px;
    line-height: 1.5;
  }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: #c0c8d4;
    letter-spacing: 0.2px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <!-- Graduation cap icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#0078d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
      </svg>
    </div>
    <h1>Намир Групп</h1>
    <p>Сургалтын системд нэвтрэх</p>
  </div>

  <!-- Microsoft SSO Button -->
  <button class="ms-btn" onclick="loginWithMicrosoft()">
    <div class="ms-logo">
      <span></span><span></span><span></span><span></span>
    </div>
    Microsoft акаунтаар нэвтрэх
  </button>

  <div class="sep">
    <span></span>
    <p>эсвэл имэйлээр</p>
    <span></span>
  </div>

  <label for="email">Корпорат имэйл хаяг</label>
  <div class="input-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
    </svg>
    <input type="email" id="email" placeholder="name@company.mn" />
  </div>

  <button class="submit-btn" onclick="redirectByEmail()">Үргэлжлүүлэх →</button>

  <div class="error" id="error"></div>

  <div class="footer">Намир Групп © 2026</div>
</div>

<script>
// Azure AD credentials
const CLIENT_ID = "5e1907e1-bb7d-4fca-a25e-eae236abd290";
const TENANT_ID = "97db511a-8405-4054-8686-b2ee778939d6";
const REDIRECT_URI = encodeURIComponent(window.location.href.split('?')[0]);

// Domain → TalentLMS branch mapping
const branchMap = {
  "novatek.mn"        : "engineering",
  "domus.mn"          : "engineering",
  "sigma3.mn"         : "engineering",
  "cablehouse.mn"     : "engineering",
  "numur.mn"          : "financial",
  "leasing.numur.mn"  : "financial",
  "drillex.mn"        : "industrial",
  "kemex.mn"          : "industrial",
  "mekhlopat.mn"      : "industrial1",
  "unitedparts.mn"    : "industrial1",
  "kms.mn"            : "industrial1",
  "bavariamotors.mn"  : "mobilityandlifestyle",
  "gangantogos.mn"    : "mobilityandlifestyle1",
  "unicom.mn"         : "mobilityandlifestyle2u",
  "ayangastore.mn"    : "mobilityandlifestyle2u",
  "namir.mn"          : "namir",
  "snowball.mn"       : "namir",
  "k2.international"  : "namir",
  "snowball.am"       : "namir",
  "blackswan.global"  : "namir"
};

// Microsoft SSO login — идэвхжүүлэхэд email автоматаар ирдэг
function loginWithMicrosoft() {
  const authUrl =
    `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize` +
    `?client_id=${CLIENT_ID}` +
    `&response_type=id_token` +
    `&redirect_uri=${REDIRECT_URI}` +
    `&scope=openid%20email%20profile` +
    `&response_mode=fragment` +
    `&nonce=${Math.random().toString(36).slice(2)}`;

  window.location.href = authUrl;
}

// Microsoft-аас буцаж ирэхэд id_token-г задлан email авна
function handleMicrosoftCallback() {
  const hash = window.location.hash;
  if (!hash.includes("id_token")) return;

  const params = new URLSearchParams(hash.substring(1));
  const token = params.get("id_token");
  if (!token) return;

  try {
    // JWT payload задлах (base64 decode)
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    const email = payload.email || payload.preferred_username || "";
    if (email) {
      redirectToTalentLMS(email);
    } else {
      showError("Microsoft акаунтаас имэйл авч чадсангүй.");
    }
  } catch (e) {
    showError("Нэвтрэхэд алдаа гарлаа. Дахин оролдоно уу.");
  }
}

// Имэйлээр гараар оруулан redirect хийх
function redirectByEmail() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const errorEl = document.getElementById("error");
  errorEl.style.display = "none";

  if (!email || !email.includes("@")) {
    showError("Имэйл хаягаа зөв оруулна уу.");
    return;
  }

  redirectToTalentLMS(email);
}

function redirectToTalentLMS(email) {
  const domain = email.split("@")[1];
  const branch = branchMap[domain];

  if (branch) {
    // TalentLMS SSO URL руу шилжүүлнэ (Microsoft SSO автоматаар ажиллана)
    window.location.href = `https://${branch}-namirgroup.talentlms.com/index/ssoLogin`;
  } else {
    showError("Таны имэйл домэйн танигдсангүй. Удирдлагатайгаа холбоо барина уу.");
  }
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = "block";
}

// Enter товч
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("email").addEventListener("keydown", function(e) {
    if (e.key === "Enter") redirectByEmail();
  });

  // Microsoft-аас буцаж ирсэн эсэхийг шалгана
  handleMicrosoftCallback();
});
</script>

</body>
</html>
